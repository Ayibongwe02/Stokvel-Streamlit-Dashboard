services:
  web:
    image: ${IMAGE:-stokvel-forecasting:latest}
    build: .
    ports:
      - "5000:5000"
    environment:
      - ANVIL_SECRET_KEY=${ANVIL_SECRET_KEY:?set a strong secret key}
      - FLASK_ENV=production
      - DEBUG=False
    volumes:
      - stokvel-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  stokvel-data:
