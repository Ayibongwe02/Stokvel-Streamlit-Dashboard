name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

      - name: Run tests with coverage
        run: pytest --cov=src --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  docker-build-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t stokvel-forecasting:ci .

      - name: Run container and health check
        run: |
          docker run -d --name stokvel-ci -p 5000:5000 stokvel-forecasting:ci
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000/healthz; then echo "healthy"; break; fi
            sleep 2
          done
          curl -sf http://localhost:5000/healthz
          docker logs stokvel-ci
          docker stop stokvel-ci

      - name: Report image size
        run: docker image inspect stokvel-forecasting:ci --format='Image size: {{.Size}} bytes'
