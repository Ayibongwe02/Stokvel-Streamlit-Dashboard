server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # The dashboard polls this file every 60s for auto-refresh — make sure
    # nothing (browser, proxy, CDN) caches a stale copy. The frontend also
    # cache-busts with a `?t=` query param, but this is belt-and-braces.
    location = /data/dashboard_data.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # Static assets can be cached for a while — filenames don't change on
    # deploy (no build hashing in this vanilla-JS app), so keep this modest.
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Don't leak nginx version in error pages / headers
    server_tokens off;
}
